<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>BTC Dashboard – Bitvavo</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="assent/styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>BTC/EUR Dashboard</h1>
      <p>Bitvavo · Live‑Preis, Chart & Alarm</p>
    </header>

    <main class="main">
      <section class="top-row">
        <div class="card">
          <h2>Aktueller Preis</h2>
          <div class="price-row">
            <span id="currentPrice">–</span>
            <span class="price-label">BTC/EUR</span>
          </div>
          <div class="status" id="wsStatus">WebSocket: Verbinde…</div>
        </div>

        <div class="card">
          <h2>Preisalarm</h2>
          <label for="alarmInput">Alarm bei Preis ≥</label>
          <div class="alarm-row">
            <input
              type="number"
              id="alarmInput"
              placeholder="z.B. 60000"
              step="100"
            />
            <span>€</span>
          </div>
          <button id="setAlarmBtn">Alarm setzen</button>
          <div class="status" id="alarmStatus">Kein Alarm gesetzt.</div>
        </div>
      </section>

      <section class="card chart-card">
        <h2>BTC/EUR Chart (1m Candles – Close)</h2>
        <canvas id="btcChart"></canvas>
      </section>
    </main>
  </div>

  <!-- App Logic -->
  <script src="assent/scripts.js"></script>
</body>
</html>
